<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencarian Nilai Mahasiswa</title>
</head>
<body>

    <h2>Program Pencarian Nilai Mahasiswa</h2>

    <label>Nama Mahasiswa:</label><br>
    <input type="text" id="nama"><br><br>

    <label>Nilai Tugas:</label><br>
    <input type="number" id="tugas"><br><br>

    <label>Nilai UTS:</label><br>
    <input type="number" id="uts"><br><br>

    <label>Nilai UAS:</label><br>
    <input type="number" id="uas"><br><br>

    <button onclick="hitungNilai()">Proses Nilai</button>

    <h3>Hasil:</h3>
    <p id="hasil"></p>

    <script src="script.js"></script>

</body>
</html>
