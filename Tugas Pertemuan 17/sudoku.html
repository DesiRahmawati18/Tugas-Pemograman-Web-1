<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudoku Sederhana</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        .sudoku-container {
            max-width: 760px;
            margin: 0 auto;
            text-align: center;
        }

        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, minmax(40px, 1fr));
            gap: 2px;
            margin: 1rem auto;
            width: 100%;
            max-width: 460px;
            background: #333;
            border: 4px solid #222;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .sudoku-cell {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f4f4f4;
            border: 1px solid #999;
            font-size: 1.1rem;
            font-weight: bold;
            color: #222;
            text-align: center;
            outline: none;
        }

        .sudoku-cell.fixed {
            background: #d1e7dd;
            color: #064e3b;
        }

        .sudoku-cell.invalid {
            background: #f8d7da;
            color: #842029;
        }

        .sudoku-cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            background: transparent;
            font-size: 1.25rem;
            font-weight: bold;
            color: inherit;
        }

        .sudoku-cell input:focus {
            outline: 2px solid #4caf50;
        }

        .sudoku-board .row-separator:nth-child(3n) {
            border-bottom: 3px solid #333;
        }

        .sudoku-board .col-separator:nth-child(3n) {
            border-right: 3px solid #333;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .button-row button {
            min-width: 120px;
        }

        .game-status {
            margin-top: 1rem;
            font-size: 1rem;
            color: #333;
            min-height: 2rem;
        }

        .key-notes {
            margin-top: 1rem;
            color: #555;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container sudoku-container">
        <h1>Sudoku Sederhana</h1>
        <p>Gunakan angka 1-9 untuk menyelesaikan papan. Klik "Periksa" untuk mengetahui jawaban.</p>

        <div id="board" class="sudoku-board"></div>

        <div class="button-row">
            <button id="checkBtn">Periksa</button>
            <button id="resetBtn">Reset</button>
            <button id="solveBtn">Tunjukkan Solusi</button>
        </div>

        <div id="status" class="game-status">Silakan mulai mengisi.</div>
        <div class="key-notes">Input hanya boleh angka 1-9. Kotak hijau adalah angka tetap, kotak merah menunjukkan kesalahan.</div>
    </div>

    <script>
        class Cell {
            constructor(row, col, value = 0, fixed = false) {
                this.row = row;
                this.col = col;
                this.value = value;
                this.fixed = fixed;
                this.element = null;
            }

            createElement() {
                const cell = document.createElement('div');
                cell.classList.add('sudoku-cell');
                if (this.fixed) {
                    cell.classList.add('fixed');
                }

                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.value = this.value > 0 ? this.value : '';
                input.disabled = this.fixed;
                input.dataset.row = this.row;
                input.dataset.col = this.col;
                input.autocomplete = 'off';

                if (this.fixed) {
                    input.readOnly = true;
                }

                this.element = cell;
                cell.appendChild(input);
                return cell;
            }

            setValue(value) {
                this.value = value;
                const input = this.element.querySelector('input');
                input.value = value > 0 ? value : '';
            }

            markInvalid(flag) {
                if (flag) {
                    this.element.classList.add('invalid');
                } else {
                    this.element.classList.remove('invalid');
                }
            }
        }

        class FixedCell extends Cell {
            constructor(row, col, value) {
                super(row, col, value, true);
            }
        }

        class EditableCell extends Cell {
            constructor(row, col) {
                super(row, col, 0, false);
            }
        }

        class SudokuGame {
            constructor(boardElementId, statusElementId) {
                this.boardElement = document.getElementById(boardElementId);
                this.statusElement = document.getElementById(statusElementId);
                this.cells = [];
                this.puzzle = [];
                this.solution = [];
                this._buildDefaultPuzzle();
                this._createCells();
                this._renderBoard();
                this._attachEvents();
            }

            _buildDefaultPuzzle() {
                this.puzzle = [
                    [5, 3, 0, 0, 7, 0, 0, 0, 0],
                    [6, 0, 0, 1, 9, 5, 0, 0, 0],
                    [0, 9, 8, 0, 0, 0, 0, 6, 0],
                    [8, 0, 0, 0, 6, 0, 0, 0, 3],
                    [4, 0, 0, 8, 0, 3, 0, 0, 1],
                    [7, 0, 0, 0, 2, 0, 0, 0, 6],
                    [0, 6, 0, 0, 0, 0, 2, 8, 0],
                    [0, 0, 0, 4, 1, 9, 0, 0, 5],
                    [0, 0, 0, 0, 8, 0, 0, 7, 9]
                ];

                this.solution = [
                    [5, 3, 4, 6, 7, 8, 9, 1, 2],
                    [6, 7, 2, 1, 9, 5, 3, 4, 8],
                    [1, 9, 8, 3, 4, 2, 5, 6, 7],
                    [8, 5, 9, 7, 6, 1, 4, 2, 3],
                    [4, 2, 6, 8, 5, 3, 7, 9, 1],
                    [7, 1, 3, 9, 2, 4, 8, 5, 6],
                    [9, 6, 1, 5, 3, 7, 2, 8, 4],
                    [2, 8, 7, 4, 1, 9, 6, 3, 5],
                    [3, 4, 5, 2, 8, 6, 1, 7, 9]
                ];
            }

            _createCells() {
                this.cells = [];
                for (let row = 0; row < 9; row++) {
                    const rowCells = [];
                    for (let col = 0; col < 9; col++) {
                        const value = this.puzzle[row][col];
                        const cell = value > 0 ? new FixedCell(row, col, value) : new EditableCell(row, col);
                        rowCells.push(cell);
                    }
                    this.cells.push(rowCells);
                }
            }

            _renderBoard() {
                this.boardElement.innerHTML = '';
                for (let row = 0; row < 9; row++) {
                    for (let col = 0; col < 9; col++) {
                        const cell = this.cells[row][col];
                        const cellElement = cell.createElement();
                        if (col === 2 || col === 5) {
                            cellElement.classList.add('col-separator');
                        }
                        if (row === 2 || row === 5) {
                            cellElement.classList.add('row-separator');
                        }
                        this.boardElement.appendChild(cellElement);
                    }
                }
            }

            _attachEvents() {
                this.boardElement.addEventListener('input', (event) => {
                    const target = event.target;
                    if (target.tagName !== 'INPUT') return;

                    const row = Number(target.dataset.row);
                    const col = Number(target.dataset.col);
                    const value = target.value.replace(/[^1-9]/g, '');
                    target.value = value;
                    this.cells[row][col].value = value ? Number(value) : 0;
                    this.cells[row][col].markInvalid(false);
                });
            }

            _getCurrentGrid() {
                return this.cells.map(row => row.map(cell => cell.value));
            }

            checkSolution() {
                const grid = this._getCurrentGrid();
                const invalidCells = [];
                let complete = true;

                for (let row = 0; row < 9; row++) {
                    for (let col = 0; col < 9; col++) {
                        const cell = this.cells[row][col];
                        const current = grid[row][col];
                        if (current === 0) {
                            complete = false;
                            continue;
                        }
                        if (current !== this.solution[row][col]) {
                            invalidCells.push(cell);
                        }
                    }
                }

                this.cells.flat().forEach(cell => cell.markInvalid(false));
                invalidCells.forEach(cell => cell.markInvalid(true));

                if (invalidCells.length === 0 && complete) {
                    this._updateStatus('Selamat! Sudoku benar dan lengkap.');
                } else if (invalidCells.length > 0) {
                    this._updateStatus('Masih ada angka yang salah. Periksa kotak merah.');
                } else {
                    this._updateStatus('Belum lengkap. Isi semua kotak yang kosong.');
                }
            }

            reset() {
                this._createCells();
                this._renderBoard();
                this._updateStatus('Permainan direset. Silakan mulai lagi.');
            }

            solve() {
                for (let row = 0; row < 9; row++) {
                    for (let col = 0; col < 9; col++) {
                        const cell = this.cells[row][col];
                        if (!cell.fixed) {
                            cell.setValue(this.solution[row][col]);
                        }
                        cell.markInvalid(false);
                    }
                }
                this._updateStatus('Solusi ditampilkan.');
            }

            _updateStatus(text) {
                this.statusElement.textContent = text;
            }
        }

        class SudokuUI extends SudokuGame {
            constructor(boardElementId, statusElementId, checkBtnId, resetBtnId, solveBtnId) {
                super(boardElementId, statusElementId);
                this.checkButton = document.getElementById(checkBtnId);
                this.resetButton = document.getElementById(resetBtnId);
                this.solveButton = document.getElementById(solveBtnId);
                this._attachControls();
            }

            _attachControls() {
                this.checkButton.addEventListener('click', () => this.checkSolution());
                this.resetButton.addEventListener('click', () => this.reset());
                this.solveButton.addEventListener('click', () => this.solve());
            }
        }

        const sudoku = new SudokuUI('board', 'status', 'checkBtn', 'resetBtn', 'solveBtn');
    </script>
</body>
</html>
